name: VAPI CI

on:
  push:
    branches: [main, develop, fix/external-review-v1]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Job 1: Smart Contract tests (Hardhat) — Node 18 + 20 matrix ───────────
  contracts:
    name: Smart Contracts (Hardhat / Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20"]
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      # Install circomlib at project root so circuit includes (../../node_modules/circomlib) resolve
      - name: Install circomlib (project root)
        working-directory: .
        run: npm install circomlib

      - name: Install contract dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run Hardhat tests
        run: npx hardhat test

  # ── Job 2: Bridge + SDK pytest — Python 3.11 / 3.12 / 3.13 matrix ─────────
  bridge:
    name: Bridge + SDK Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: bridge/requirements.txt

      - name: Install bridge dependencies
        run: |
          pip install -r bridge/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Install SDK dependencies
        run: |
          pip install cryptography eth-hash[pycryptodome]

      - name: Run bridge tests
        run: |
          python -m pytest bridge/tests/ \
            --ignore=bridge/tests/test_e2e_simulation.py \
            -m "not hardware" \
            --cov=bridge/vapi_bridge \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage-bridge.xml \
            -q

      - name: Run SDK tests
        run: |
          python -m pytest sdk/tests/ \
            --cov=sdk \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage-sdk.xml \
            -q

      - name: Upload coverage XML artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage-bridge.xml
            coverage-sdk.xml
          if-no-files-found: ignore

  # ── Job 3: OpenAPI YAML lint ────────────────────────────────────────────────
  yaml-lint:
    name: OpenAPI YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate openapi.yaml parses as valid YAML
        run: |
          python -c "
          import yaml, sys
          with open('sdk/openapi.yaml') as f:
              doc = yaml.safe_load(f)
          assert doc.get('openapi'), 'Missing openapi key'
          assert doc.get('info'), 'Missing info key'
          assert doc.get('paths'), 'Missing paths key'
          assert doc.get('components'), 'Missing components key'
          version = doc['info'].get('version', '')
          print(f'openapi.yaml valid — version={version} paths={len(doc[\"paths\"])}')
          "

  # ── Job 4: Firmware lint (header guards, C source check) ──────────────────
  firmware-lint:
    name: Firmware Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check C source files present
        run: |
          find firmware/src firmware/include -name '*.c' -o -name '*.h' 2>/dev/null | head -20
          echo "Firmware sources found — lint pass (full build requires Nordic SDK)"

      - name: Verify header guards
        run: |
          for f in firmware/include/*.h; do
            [ -f "$f" ] || continue
            guard=$(basename "$f" | tr '[:lower:].' '[:upper:]_')
            if grep -q "#ifndef ${guard}" "$f"; then
              echo "OK: $f has guard $guard"
            else
              echo "WARN: $f missing standard guard ${guard}"
            fi
          done
