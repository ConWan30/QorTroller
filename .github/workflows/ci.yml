name: VAPI CI

on:
  push:
    branches: [main, develop, fix/external-review-v1]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ── Job 1: Unified Matrix CI Enforcement ────────────────────────────────────
  ci-enforcement:
    name: CI Matrix (Python ${{ matrix.python-version }}, Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        node-version: ["18", "20"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: bridge/requirements.txt

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Set up Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install Python dependencies
        run: |
          pip install -r bridge/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx cryptography eth-hash[pycryptodome]

      - name: Install Node.js dependencies
        run: |
          npm install circomlib
          cd contracts
          npm ci

      - name: Run 173-Invariant Gate Check
        run: |
          python scripts/vapi_invariant_gate.py

      - name: Compile Rust WebAssembly Applet
        run: |
          cd w3bstream/applet
          cargo build --target wasm32-unknown-unknown --release

      - name: Run Pytest Bridge Suite
        run: |
          python -m pytest bridge/tests/ --ignore=bridge/tests/test_e2e_simulation.py -m "not hardware" -q

      - name: Run Pytest SDK Suite
        run: |
          python -m pytest sdk/tests/ -q

      - name: Run W3bstream Ingestion Invariant Test
        run: |
          python scripts/test_w3bstream_ingestion.py

      - name: Compile Hardhat Contracts
        working-directory: contracts
        run: |
          npx hardhat compile

      - name: Run Hardhat Contract Tests
        working-directory: contracts
        run: |
          npx hardhat test

  # ── Job 2: OpenAPI YAML lint (Preserved) ────────────────────────────────────
  yaml-lint:
    name: OpenAPI YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate openapi.yaml parses as valid YAML
        run: |
          python -c "
          import yaml, sys
          with open('sdk/openapi.yaml') as f:
              doc = yaml.safe_load(f)
          assert doc.get('openapi'), 'Missing openapi key'
          assert doc.get('info'), 'Missing info key'
          assert doc.get('paths'), 'Missing paths key'
          assert doc.get('components'), 'Missing components key'
          version = doc['info'].get('version', '')
          print(f'openapi.yaml valid — version={version} paths={len(doc[\"paths\"])}')
          "

  # ── Job 3: Firmware lint (Preserved) ────────────────────────────────────────
  firmware-lint:
    name: Firmware Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check C source files present
        run: |
          find firmware/src firmware/include -name '*.c' -o -name '*.h' 2>/dev/null | head -20
          echo "Firmware sources found — lint pass (full build requires Nordic SDK)"

      - name: Verify header guards
        run: |
          for f in firmware/include/*.h; do
            [ -f "$f" ] || continue
            guard=$(basename "$f" | tr '[:lower:].' '[:upper:]_')
            if grep -q "#ifndef ${guard}" "$f"; then
              echo "OK: $f has guard $guard"
            else
              echo "WARN: $f missing standard guard ${guard}"
            fi
          done
