# QorTroller — production reverse proxy (nginx)
# ---------------------------------------------------------------------------
# Same purpose as deploy/Caddyfile: serve the built frontend and proxy the
# bridge prefixes so the frontend's relative /operator|/public|/api… paths reach
# the bridge same-origin. See deploy/README.md.
#
#   1) cd frontend && npm run build      # → frontend/dist
#   2) set `root` to that dist path
#   3) run the bridge (binds 127.0.0.1:8080)
#   4) nginx -c .../deploy/nginx.conf (or include this server block)
#
# SECURITY: the built bundle bakes in VITE_VAPI_API_KEY (operator key). Do not
# publish an operator build to an untrusted audience — see deploy/README.md.

upstream qortroller_bridge { server 127.0.0.1:8080; }

server {
    listen 80;
    server_name qortroller.example.com;

    root /srv/qortroller/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/wasm;

    # ── Bridge API + mounted sub-apps — same prefixes as the Vite dev proxy ──
    location ~ ^/(operator|public|api|agent|bridge|gate|devices|proof|enrollment|curator|dash|federation|monitor|health)(/|$) {
        proxy_pass http://qortroller_bridge;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSocket twin stream ──
    location /ws {
        proxy_pass http://qortroller_bridge;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── SPA fallback — built assets + self-contained html pages, else index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
