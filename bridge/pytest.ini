[pytest]
# VAPI Core test suite isolation — runs ONLY bridge/tests.
# This is the canonical VAPI health signal. It must always be green.
# Run: pytest bridge/     (from project root) or
#      pytest             (from bridge/ directory)
testpaths = tests
addopts = --import-mode=importlib -m "not hardware and not bluetooth"
asyncio_mode = strict

[pytest:markers]
hardware: requires physical DualShock Edge (Sony CFI-ZCP1) connected via USB.
          Skip in CI; run with: pytest tests/hardware/ -v -m hardware
bluetooth: requires physical DualShock Edge (Sony CFI-ZCP1) connected via Bluetooth.
           Skip in CI; run with: pytest tests/hardware/ -v -m bluetooth
