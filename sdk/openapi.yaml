          type: boolean
          description: "True if all O2_SUGGEST gates clear"
        o2_blockers:
          type: array
          items: { type: string }
          description: "Human-readable blocker strings (e.g. shadow_age_152.1h_under_min_504h)"
        o3_ready:
          type: boolean
          description: "True if all O3_ACT gates clear"
        o3_blockers:
          type: array
          items: { type: string }
          description: "Human-readable O3 blocker strings"
        error:
          type: string
          nullable: true
          description: "Per-agent evaluation error (fail-open; null on success)"

    FleetReadinessRoot:
      type: object
      description: "Fleet Readiness Root commitment + summary (Phase O1-FRR)"
      properties:
        frr_hex:
          type: string
          description: "FRR commitment (SHA-256 of FROZEN-v1 pre-image; 64 hex chars)"
        frr_ts_ns:
          type: integer
          description: "ts_ns_be component baked into the commitment"
        frr_error:
          type: string
          nullable: true
          description: "FRR computation error (fail-open; null on success)"
        fleet_phase_aligned:
          type: boolean
          description: "True if all agents share the same current_phase"
