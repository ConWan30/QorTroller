              on_chain_tx:
                type: string
                nullable: true
                description: "IoTeX tx hash when AgentContextRegistry.anchor() was called; null if not anchored"
              anchored_at:
                type: number
                nullable: true
                description: "Unix timestamp of on-chain anchoring; null if not anchored"
