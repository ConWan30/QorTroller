          type: string
          example: CHAIN_BROKEN
        message:
          type: string
          example: "Record at index 2 has invalid prev_poac_hash"
        detail:
          type: object
          additionalProperties: true
          nullable: true

webhooks:
  CheatDetected:
    post:
      summary: Fired when a cheat inference is detected in a submitted record
      description: |
        Register a webhook URL via your VAPI dashboard to receive real-time
        cheat detection events. The payload is signed with HMAC-SHA256 using
        your webhook secret (X-VAPI-Signature header).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  example: cheat_detected
                session_id:
                  type: string
                device_id:
                  type: string
                record_hash:
                  type: string
                inference_result:
                  type: integer
                inference_name:
                  type: string
                  example: DRIVER_INJECT
                confidence:
                  type: integer
                timestamp_ms:
                  type: integer
                  format: int64
      responses:
        "200":
          description: Webhook acknowledged

    L4RecalibrationStatus:
      type: object
      description: >
        Phase 134 L4 recalibration pipeline status. stale=True when live_feature_dim != calibration_feature_dim
        (13 vs 12). Run recalibrate_l4_pipeline.py --db ~/.vapi/bridge.db to clear staleness.
      properties:
        in_progress:
          type: boolean
          description: "True if a recalibration job is currently running"
        last_run_ts:
          type: number
          description: "Unix timestamp of last completed run (0.0 if never run)"
        sessions_processed:
          type: integer
          description: "Number of calibration sessions used in last run"
        new_anomaly_threshold:
          type: number
          description: "Anomaly threshold from last run (or current config value)"
        new_continuity_threshold:
          type: number
          description: "Continuity threshold from last run (or current config value)"
        stale:
          type: boolean
          description: "True when live_feature_dim != calibration_feature_dim"
        timestamp:
          type: number
          description: "Unix timestamp of response"

    AutoSeparationSnapshotStatus:
      type: object
      description: >
        Phase 134 auto-separation snapshot trigger. When auto_separation_snapshot_enabled=True,
        analyze_interperson_separation.py runs as a subprocess after each live session ruling,
        writing a fresh snapshot to separation_ratio_snapshots table for SeparationRatioMonitorAgent.
      properties:
        auto_separation_snapshot_enabled:
          type: boolean
          description: "True when AUTO_SEPARATION_SNAPSHOT_ENABLED=true in config"
        snapshot_count:
          type: integer
          description: "Total snapshots in separation_ratio_snapshots table"
        last_snapshot_ts:
          type: number
          description: "created_at of most recent snapshot (0.0 if none)"
        last_snapshot_ratio:
          type: number
          description: "pooled_ratio of most recent snapshot (0.0 if none)"
        timestamp:
          type: number
          description: "Unix timestamp of response"

    TournamentActivationChainStatus:
      type: object
      description: >
        Phase 135 TournamentActivationChainAgent (agent #16) status.
        Subscribes to separation_ratio_breakthrough bus event (SeparationRatioMonitorAgent).
        INVARIANT: auto_activate_on_breakthrough=False PERMANENTLY.
        Tournament activation requires explicit operator action.
        Current separation ratio 0.474 — TOURNAMENT BLOCKER (target >= 1.0).
      properties:
        gate_open_notified:
          type: boolean
          description: "True if separation_ratio_breakthrough was received and notification fired"
        auto_activate_on_breakthrough:
          type: boolean
          description: "PERMANENT False — auto-activation is never permitted"
        operator_action_required:
          type: boolean
          description: "Always True — operator must use POST /agent/commit-activation"
        last_ratio:
          type: number
          description: "Separation ratio at time of notification (0.0 if no notification yet)"
        last_notification_ts:
          type: number
          description: "Unix timestamp of last notification (0.0 if none)"
        notification_count:
          type: integer
          description: "Total entries in tournament_activation_chain_log"
        timestamp:
          type: number
          description: "Unix timestamp of response"
