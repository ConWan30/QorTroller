    # =========================================================================
    # Phase 237-CONSENT — Per-Category Gamer Consent schemas
    # =========================================================================

    GamerConsentStatus:
      type: object
      description: |
        Phase 237-CONSENT — Aggregated per-(device, category) consent state.
        Returned by GET /agent/gamer-consent-status when no `category` filter
        is supplied. Each of the four ConsentCategory values has an entry
        regardless of whether the device has a consent_ledger row for it
        (categories with no record report granted=False, found=False).
      required:
        - device_id
        - categories
      properties:
        device_id:
          type: string
          description: Device identifier
        categories:
          type: object
          description: Map of category name to ConsentCategoryStatus
          additionalProperties:
            $ref: "#/components/schemas/ConsentCategoryStatus"

    ConsentCategoryStatus:
      type: object
      description: |
        Phase 237-CONSENT — Single-category consent status for a device.
        Returned by GET /agent/gamer-consent-status when `category` filter
        is supplied, or as a value within GamerConsentStatus.categories.
      required:
        - category
        - granted
      properties:
        category:
          type: string
          enum: [TOURNAMENT_GATE, ANONYMIZED_RESEARCH, MANUFACTURER_CERT, MARKETPLACE]
        granted:
          type: boolean
          description: True iff consent_given AND NOT revoked AND NOT erasure_requested
        consent_given:
          type: boolean
        consent_ts:
          type: number
          nullable: true
        revoked:
          type: boolean
        revocation_reason:
          type: string
        erasure_requested:
          type: boolean
        erasure_completed:
          type: boolean
        found:
          type: boolean

    CategoryConsentRecordResult:
      type: object
      description: Phase 237-CONSENT — Response from POST /operator/record-category-consent.
      properties:
        row_id:        { type: integer }
        device_id:     { type: string }
        category:      { type: string }
        granted:       { type: boolean, default: true }
        ttl_s:         { type: integer }
        consent_hash:  { type: string }
        reason:        { type: string }
        on_chain:      { type: boolean, default: false }
        timestamp:     { type: number }

    CategoryConsentRevokeResult:
      type: object
      description: Phase 237-CONSENT — Response from POST /operator/revoke-category-consent.
      properties:
        row_updated: { type: boolean }
        device_id:   { type: string }
        category:    { type: string }
        reason:      { type: string }
        on_chain:    { type: boolean, default: false }
        timestamp:   { type: number }

webhooks:
  CheatDetected:
    post:
      summary: Fired when a cheat inference is detected in a submitted record
      description: |
        Register a webhook URL via your VAPI dashboard to receive real-time
        cheat detection events. The payload is signed with HMAC-SHA256 using
        your webhook secret (X-VAPI-Signature header).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  example: cheat_detected
                session_id:
                  type: string
                device_id:
                  type: string
                record_hash:
                  type: string
                inference_result:
                  type: integer
                inference_name:
                  type: string
                  example: DRIVER_INJECT
                confidence:
                  type: integer
                timestamp_ms:
                  type: integer
                  format: int64
      responses:
        "200":
          description: Webhook acknowledged

    L4RecalibrationStatus:
      type: object
      description: >
        Phase 134 L4 recalibration pipeline status. stale=True when live_feature_dim != calibration_feature_dim
        (13 vs 12). Run recalibrate_l4_pipeline.py --db ~/.vapi/bridge.db to clear staleness.
      properties:
        in_progress:
          type: boolean
          description: "True if a recalibration job is currently running"
        last_run_ts:
          type: number
          description: "Unix timestamp of last completed run (0.0 if never run)"
        sessions_processed:
          type: integer
          description: "Number of calibration sessions used in last run"
        new_anomaly_threshold:
          type: number
          description: "Anomaly threshold from last run (or current config value)"
