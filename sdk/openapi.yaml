          type: integer
          description: "Number of agents in the fleet (3: sentry/guardian/curator)"
        fleet_at_o1_count:
          type: integer
        fleet_at_o2_ready_count:
          type: integer
        fleet_at_o3_ready_count:
          type: integer
        next_alignment_target:
          type: string
          description: "Phase the fleet is converging on (O2_SUGGEST / O3_ACT / NONE)"
