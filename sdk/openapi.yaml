      type: object
      description: >-
        Log of Class J HIGH-risk triggered out-of-cycle LLM rulings (Phase 82).
        was_deferred=true entries were suppressed by the token bucket rate limiter.
      required: [entries, total_returned, deferred_count]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ReactiveAdjudicationEntry"
        total_returned:
          type: integer
