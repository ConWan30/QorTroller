  # ===========================================================================
  # Phase 237-CONSENT — Per-Category Gamer Consent
  # ===========================================================================
  # Three endpoints exposing the consent ledger:
  #   GET  /agent/gamer-consent-status          — read-only, x-api-key
  #   POST /operator/record-category-consent    — operator auth, never on-chain
  #   POST /operator/revoke-category-consent    — operator auth, never on-chain
  #
  # On-chain consent is gamer-self-sovereign: gamer signs grantConsent /
  # revokeConsent on VAPIConsentRegistry from their own wallet (msg.sender).
  # The bridge READS on-chain state via chain.is_consent_valid() (Phase 237 core)
  # but never writes on the gamer's behalf.

  /agent/gamer-consent-status:
    get:
      tags: [Agent]
      summary: Per-category gamer consent state (Phase 237-CONSENT)
      description: |
        Returns per-(device, category) consent state from the local consent_ledger.
        When `category` query param is provided, returns single-category status.
        When omitted, returns aggregated status across all four categories.
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: query
          required: true
          schema:
            type: string
          description: Device identifier (required; 422 on empty)
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [TOURNAMENT_GATE, ANONYMIZED_RESEARCH, MANUFACTURER_CERT, MARKETPLACE]
          description: Optional single-category filter; omit for aggregated view
      responses:
        "200":
          description: Consent status retrieved
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/GamerConsentStatus"
                  - $ref: "#/components/schemas/ConsentCategoryStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Missing device_id or unknown category name

  /operator/record-category-consent:
    post:
      tags: [Operator]
      summary: Record per-category consent in local ledger (Phase 237-CONSENT)
      description: |
        Operator records consent that was given out-of-band (e.g. via a
        companion app, paper consent form digitised, etc.). Writes ONLY to
        the local consent_ledger; does NOT submit on-chain. On-chain consent
        must be msg.sender-signed by the gamer's own wallet via
        VAPIConsentRegistry.grantConsent() (gamer-self-sovereign invariant).
      security:
        - BearerAuth: []
      parameters:
        - name: api_key
          in: query
          required: true
          schema: { type: string }
        - name: device_id
          in: query
          required: true
          schema: { type: string }
        - name: category
          in: query
          required: true
          schema:
            type: string
            enum: [TOURNAMENT_GATE, ANONYMIZED_RESEARCH, MANUFACTURER_CERT, MARKETPLACE]
        - name: ttl_s
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
        - name: consent_hash
          in: query
          required: false
          schema: { type: string }
          description: Optional 64-char hex from compute_consent_hash()
        - name: reason
          in: query
          required: true
          schema:
            type: string
            minLength: 10
          description: Operator audit field; minimum 10 characters
      responses:
        "200":
          description: Consent recorded locally
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryConsentRecordResult"
        "403": { description: Invalid api_key }
        "422": { description: Missing device_id, bad category, or reason < 10 chars }

  /operator/revoke-category-consent:
    post:
      tags: [Operator]
      summary: Revoke per-category consent in local ledger (Phase 237-CONSENT)
      description: |
        Operator-recorded revocation. The gamer MUST also revoke on-chain via
        VAPIConsentRegistry.revokeConsent() for the on-chain state to update.
        This endpoint updates the bridge ledger so the local consent gate
        begins blocking immediately.
      security:
        - BearerAuth: []
      parameters:
        - name: api_key
          in: query
          required: true
          schema: { type: string }
        - name: device_id
          in: query
          required: true
          schema: { type: string }
        - name: category
          in: query
          required: true
          schema:
            type: string
            enum: [TOURNAMENT_GATE, ANONYMIZED_RESEARCH, MANUFACTURER_CERT, MARKETPLACE]
        - name: reason
          in: query
          required: true
          schema:
            type: string
            minLength: 10
      responses:
        "200":
          description: Consent revoked locally
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryConsentRevokeResult"
        "403": { description: Invalid api_key }
        "422": { description: Missing device_id, bad category, or reason < 10 chars }

  /operator/fleet-readiness-root:
    get:
      tags: [Operator]
      summary: Compute the Fleet Readiness Root + per-agent O2/O3 readiness rollup (Phase O1-FRR)
      description: |
        FROZEN-v1 cryptographic primitive (eighth in PATTERN-017 family):

          frr_hex = SHA-256(
            b"VAPI-FRR-v1" || sorted(agent_id_be(32) || phase_code(1))
            for each agent || ts_ns_be(8)
          ) -> 32B

        Returns the FRR commitment + per-agent phase resolution + the
        FleetAdvancementSummary state (fleet_phase_aligned,
        next_alignment_target, etc.). Fail-open: errors surface in the
        frr_error / summary_error / per-agent error fields without raising.

        Read-key auth (x-api-key Header). Used by:
          - Frontend dashboards (Phase O3-READINESS-DASHBOARD)
          - Downstream Python tooling via VAPIFleetReadinessRoot SDK
          - Operator audit trails verifying FRR drift across watcher cycles
      security:
        - BearerAuth: []
      parameters:
        - name: x-api-key
          in: header
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Fleet readiness rollup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetReadinessRoot"
        "403": { description: Invalid api_key }

  /operator/operator-initiative-advancement-log:
    get:
      tags: [Operator]
      summary: Paginated FRR baseline history (Phase O1-FRR)
      description: |
        Returns the most recent N rows from operator_initiative_advancement_log,
        capturing each watcher cycle's evaluation + FRR commitment. Used by
        operator to inspect FRR drift over time, verify watcher cadence,
        and audit fleet phase alignment history.
      security:
        - BearerAuth: []
      parameters:
        - name: x-api-key
          in: header
          required: true
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        "200":
          description: Paginated advancement_log rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvancementLogPage"
        "403": { description: Invalid api_key }

# =============================================================================
# Components
# =============================================================================

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT signed with your VAPI API key (obtain at api.vapi.gg/keys)

  parameters:
    RecordHash:
      name: record_hash
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9a-f]{64}$"
      description: SHA-256(PoAC body) — 64 hex chars
    DeviceId:
      name: device_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9a-f]{64}$"
      description: keccak256(pubkey) — 64 hex chars (no 0x prefix)
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
      description: Session ID returned by POST /sessions

  responses:
    Unauthorized:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until rate limit resets
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:

    # ---- Record ----

    RecordSubmitRequest:
      type: object
      required: [device_id, record_b64]
      properties:
        device_id:
          type: string
          description: keccak256(pubkey) hex — 66 chars including 0x prefix
        record_b64:
          type: string
          format: byte
          description: Base64-encoded 228-byte PoAC record
        session_id:
          type: string
          description: Optional session context
        schema_version:
          type: integer
          description: "0=legacy, 1=Pebble env, 2=DualShock kinematic"
          default: 2
          enum: [0, 1, 2]

    RecordSubmitResponse:
      type: object
      properties:
        record_hash:
          type: string
          description: SHA-256(body) hex — use this to query on-chain status
        chain_hash:
          type: string
          description: SHA-256(full 228B) hex — used as prev_poac_hash for next record
        inference_name:
          type: string
          example: NOMINAL
        is_clean:
          type: boolean
        queued_at:
          type: string
          format: date-time
        estimated_on_chain_ms:
          type: integer
          description: Estimated milliseconds until on-chain confirmation

    BatchSubmitRequest:
      type: object
      required: [device_id, records_b64]
      properties:
        device_id:
          type: string
        records_b64:
          type: array
          items:
            type: string
            format: byte
          minItems: 1
          maxItems: 64
          description: Ordered array of base64-encoded 228-byte records
        session_id:
          type: string
        schema_version:
          type: integer
          default: 2

    BatchSubmitResponse:
      type: object
      properties:
        accepted:
          type: integer
        rejected:
          type: integer
        record_hashes:
          type: array
          items:
            type: string
        chain_intact:
          type: boolean

    RecordDetail:
      type: object
      properties:
        record_hash:
          type: string
        chain_hash:
          type: string
        inference_result:
          type: integer
          format: uint8
        inference_name:
          type: string
        action_code:
          type: integer
        confidence:
          type: integer
          minimum: 0
          maximum: 255
        battery_pct:
          type: integer
          minimum: 0
          maximum: 100
        monotonic_ctr:
          type: integer
          format: uint32
        timestamp_ms:
          type: integer
          format: int64
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        bounty_id:
          type: integer
          format: uint32
        is_clean:
          type: boolean
        is_advisory:
          type: boolean
        on_chain:
          type: boolean
        tx_hash:
          type: string
          nullable: true

    # ---- Chain ----

    ChainVerifyRequest:
      type: object
      required: [device_id, record_b64]
      properties:
        device_id:
          type: string
        record_b64:
          type: string
          format: byte
        schema_version:
          type: integer
          default: 2

    ChainVerifyResponse:
      type: object
      properties:
        verified:
          type: boolean
        tx_hash:
          type: string
          nullable: true
        on_chain_inference:
          type: integer
          nullable: true
          description: Inference byte stored on-chain (null if not yet confirmed)
        record_hash:
          type: string

    ChainIntegrityRequest:
      type: object
      required: [records_b64]
      properties:
        records_b64:
          type: array
          items:
            type: string
            format: byte
          description: Ordered 228-byte records to chain-check

    ChainIntegrityResponse:
      type: object
      properties:
        intact:
          type: boolean
        broken_at_index:
          type: integer
          nullable: true
          description: Index of first broken link (null if intact)
        record_count:
          type: integer

    # ---- Device ----

    DeviceProfile:
      type: object
      properties:
        profile_id:
          type: string
          example: sony_dualshock_edge_v1
        display_name:
          type: string
          example: Sony DualShock Edge (CFI-ZCP1)
        manufacturer:
          type: string
        hid_vendor_id:
          type: integer
          format: uint16
          example: 0x054C
        hid_product_ids:
          type: array
          items:
            type: integer
            format: uint16
        phci_tier:
          type: string
          enum: [NONE, STANDARD, CERTIFIED]
        schema_version:
          type: integer
          enum: [1, 2]
        sensor_commitment_size_bytes:
          type: integer
          enum: [48, 56]
        has_adaptive_triggers:
          type: boolean
        has_gyroscope:
          type: boolean
        has_accelerometer:
          type: boolean
        pitl_layers:
          type: array
          items:
            type: integer
            enum: [2, 3, 4, 5]

    PHCICertification:
      type: object
      properties:
        profile_id:
          type: string
        phci_tier:
          type: string
          enum: [NONE, STANDARD, CERTIFIED]
        is_certified:
          type: boolean
        score:
          type: integer
          minimum: 0
          maximum: 100
        passed_checks:
          type: array
          items:
            type: string
        failed_checks:
          type: array
          items:
            type: string

    # ---- Session ----

    SessionCreateRequest:
      type: object
      required: [device_id]
      properties:
        device_id:
          type: string
        profile_id:
          type: string
          description: Explicit PHCI profile (optional; auto-detected from device_id if omitted)
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary game/platform context (game_id, match_id, etc.)

    SessionCreateResponse:
      type: object
      properties:
        session_id:
          type: string
        device_id:
          type: string
        profile_id:
          type: string
        phci_tier:
          type: string
        created_at:
          type: string
          format: date-time

    SessionSummary:
      type: object
      properties:
        session_id:
          type: string
        total_records:
          type: integer
        clean_records:
          type: integer
        cheat_detections:
          type: integer
        advisory_records:
          type: integer
        chain_integrity:
          type: boolean
        started_at:
          type: string
          format: date-time
        duration_s:
          type: number

    SDKAttestation:
      type: object
      description: |
        Cryptographically-bound proof that each PITL layer (L2–L5) is active and
        correctly wired. attestation_hash = SHA-256(layers||scores||version||ts_ns).
        Submit on-chain as proof of correct SDK integration.
      properties:
        sdk_version:
          type: string
          example: "1.0.0-phase20"
        layers_active:
          type: object
          description: Boolean presence of each PITL layer
          properties:
            L2_hid_xinput:
              type: boolean
            L3_behavioral:
              type: boolean
            L4_biometric:
              type: boolean
            L5_temporal:
              type: boolean
        pitl_scores:
          type: object
          description: Per-layer detection confidence (0.0–1.0)
          properties:
            L2_hid_xinput:
              type: number
              minimum: 0.0
              maximum: 1.0
            L3_behavioral:
              type: number
              minimum: 0.0
              maximum: 1.0
            L4_biometric:
              type: number
              minimum: 0.0
              maximum: 1.0
            L5_temporal:
              type: number
              minimum: 0.0
              maximum: 1.0
        all_layers_active:
          type: boolean
        active_layer_count:
          type: integer
          minimum: 0
          maximum: 4
        zk_proof_available:
          type: boolean
        verified_at:
          type: number
          format: double
          description: Unix epoch (float seconds with nanosecond precision)
        attestation_hash_hex:
          type: string
          description: SHA-256 commitment — 64 hex chars

    # ---- Bounty ----

    Bounty:
      type: object
      properties:
        bounty_id:
          type: integer
          format: uint32
        title:
          type: string
        reward_iotx:
          type: string
          description: Reward amount in IOTX (string to avoid float precision loss)
        min_phci_tier:
          type: string
          enum: [NONE, STANDARD, CERTIFIED]
        expires_at:
          type: string
          format: date-time
        claimants:
          type: integer

    # ---- Leaderboard ----

    DeviceRating:
      type: object
      properties:
        device_id:
          type: string
        rating:
          type: integer
          minimum: 0
          maximum: 3000
        tier:
          type: string
          enum: [Bronze, Silver, Gold, Platinum, Diamond]
        profile_id:
          type: string
        last_updated:
          type: string
          format: date-time

    # ---- Player (Phase 21–26) ----

    PlayerProfile:
      type: object
      description: PHG player profile with humanity-weighted score and PITL averages.
      properties:
        device_id:
          type: string
        phg_score:
          type: integer
          description: "Raw PHG score: Σ CAST(confidence/255×10 AS INTEGER) for NOMINAL records"
        phg_score_weighted:
          type: integer
          description: "Humanity-weighted PHG score: phg_score × (1 + humanity_prob × 0.5)"
        humanity_prob_avg:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Average fused humanity probability (0.4×L4 + 0.4×L5 + 0.2×E4)
        l5_rhythm_humanity_avg:
          type: number
          format: float
          description: Average L5 TemporalRhythmOracle humanity score
        total_records:
          type: integer
        nominal_records:
          type: integer
        confidence_mean:
          type: number
          format: float
        records_verified:
          type: integer
        first_seen:
          type: number
          format: double
        last_seen:
          type: number
          format: double

    PITLBucket:
      type: object
      description: Minute-bucket of non-NOMINAL inference detections.
      properties:
        bucket:
          type: integer
          description: Unix timestamp rounded to nearest minute
        inference:
          type: integer
          format: uint8
          description: Inference code (0x28, 0x29, 0x2A, 0x2B, 0x30)
        cnt:
          type: integer
          description: Count of detections in this bucket

    PHGCheckpoint:
      type: object
      description: PHG checkpoint committed on-chain.
      properties:
        id:
          type: integer
        device_id:
          type: string
        phg_score:
          type: integer
          description: Score delta committed in this checkpoint
        record_count:
          type: integer
        bio_hash:
          type: string
          description: SHA-256 of averaged L4 biometric features (hex)
        tx_hash:
          type: string
          nullable: true
        committed_at:
          type: number
          format: double
        last_committed_score:
          type: integer
          description: Cumulative score at time of this checkpoint
        confirmed:
          type: boolean
          description: True if on-chain receipt confirmed (status=1)

    ContinuityClaim:
      type: object
      description: Biometric identity continuity attestation claim.
      properties:
        device_id:
          type: string
        claimed_by:
          type: string
          nullable: true
        claimed_at:
          type: number
          format: double
        direction:
          type: string
          enum: [source, dest]
          description: Whether this device is the old (source) or new (dest) identity

    BehavioralReport:
      type: object
      description: Behavioral archaeology analysis for adversarial pattern detection.
      properties:
        device_id:
          type: string
        warmup_attack_score:
          type: number
          format: float
          description: Score 0–1 indicating warmup-then-attack behavioral pattern
        burst_farming_score:
          type: number
          format: float
          description: Score 0–1 indicating coordinated burst farming pattern
        drift_trend_slope:
          type: number
          format: float
          description: Linear slope of biometric drift over sessions
        biometric_stability:
          type: number
          format: float
          description: Stability coefficient of biometric fingerprint

    PITLProof:
      type: object
      description: PITL session proof for PHGCredential minting.
      properties:
        id:
          type: integer
        device_id:
          type: string
        nullifier_hash:
          type: string
          description: Unique nullifier preventing proof replay (hex)
        feature_commitment:
          type: string
          description: SHA-256 commitment of normalized biometric features (hex)
        humanity_prob_int:
          type: integer
          minimum: 0
          maximum: 1000
          description: humanity_probability × 1000 (integer, 1000 = 100% human)
        tx_hash:
          type: string
          nullable: true
        created_at:
          type: number
          format: double

    FarmCluster:
      type: object
      description: Cluster of devices showing correlated farming behavior.
      properties:
        cluster_id:
          type: integer
        member_count:
          type: integer
        correlation_score:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
        devices:
          type: array
          items:
            type: string

    # ---- Credential (Phase 28) ----

    PHGCredential:
      type: object
      description: |
        Soulbound PHGCredential record. Credentials are ERC-5192-inspired:
        locked=true, bound to deviceId (not wallet address), non-transferable.
        humanityProbInt ∈ [0, 1000] = humanity_probability × 1000.
      properties:
        device_id:
          type: string
          description: keccak256(pubkey) hex — credential is bound to this identity
        credential_id:
          type: integer
          description: On-chain credential ID (1-indexed; 0 = not minted sentinel)
        tx_hash:
          type: string
          description: Mint transaction hash
        minted_at:
          type: number
          format: double
          description: Unix epoch when credential was minted

    PHGLeaderboardEntry:
      type: object
      description: PHG humanity leaderboard entry (confirmed checkpoints only).
      properties:
        device_id:
          type: string
        cumulative_score:
          type: integer
          description: Maximum confirmed cumulative PHG score
        record_count:
          type: integer
          description: Total NOMINAL records contributing to score

    PHGEligibility:
      type: object
      description: TournamentGateV2 eligibility result for bounty claiming.
      properties:
        eligible:
          type: boolean
          description: True if device meets minCumulative AND minVelocity thresholds
        cumulative_score:
          type: integer
        details:
          type: string
          description: Human-readable explanation of eligibility status

    # ---- Operator Gate (Phase 29) ----

    OperatorGateResponse:
      type: object
      description: |
        HMAC-signed eligibility response for tournament operator gate checks.
        Operators verify `sig` to confirm the bridge generated this response.
        **Signature:** HMAC-SHA256(f"{device_id}:{int(eligible)}:{timestamp}", api_key)
      required: [device_id, eligible, cumulative_score, timestamp, sig]
      properties:
        device_id:
          type: string
          description: keccak256(pubkey) hex — 64 chars
        eligible:
          type: boolean
          description: True if device has confirmed PHG score > 0
        cumulative_score:
          type: integer
          description: Last confirmed cumulative PHG score (0 if no checkpoints)
        credential_id:
          type: integer
          nullable: true
          description: On-chain credential ID if credential minted, else null
        timestamp:
          type: integer
          description: Unix epoch seconds when this response was generated
        sig:
          type: string
          description: HMAC-SHA256 signature hex — verify this to trust the response

    # ---- Bridge Agent (Phase 30) ----

    BridgeAgentRequest:
      type: object
      required: [session_id, message]
      properties:
        session_id:
          type: string
          description: |
            Caller-managed session identifier. Re-use the same ID across requests
            to maintain multi-turn conversation context.
          example: "operator-session-abc123"
        message:
          type: string
          description: Natural-language question or command for the agent.
          example: "Is player aa...aa eligible for the tournament? Why?"

    BridgeAgentResponse:
      type: object
      required: [session_id, response, tools_used]
      properties:
        session_id:
          type: string
          description: Echo of the caller-provided session_id.
        response:
          type: string
          description: The agent's natural-language answer.
        tools_used:
          type: array
          items:
            type: string
          description: |
            List of bridge tool names the agent invoked to produce the response
            (e.g. ["get_player_profile", "run_pitl_calibration"]).

    # ---- Bridge Agent Streaming (Phase 31) ----

    BridgeAgentStreamEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [text_delta, tool_start, tool_result, done, error]
          description: |
            Event type in the SSE stream:
            - text_delta: incremental response text token
            - tool_start: agent is invoking a bridge tool
            - tool_result: tool execution result preview
            - done: stream is complete; final tools_used list attached
            - error: non-fatal error (anthropic not installed, etc.)
        text:
          type: string
          description: "Present when type=text_delta — the incremental text fragment."
        tool:
          type: string
          description: "Present when type=tool_start or tool_result — the tool name."
        preview:
          type: string
          description: "Present when type=tool_result — first 120 chars of the result."
        tools_used:
          type: array
          items:
            type: string
          description: "Present when type=done — list of all tools invoked in this turn."
        message:
          type: string
          description: "Present when type=error — error description."

    # ---- Phase 32: Proactive Intelligence ----

    ProtocolInsight:
      type: object
      description: A proactive protocol insight generated by ProactiveMonitor or BridgeAgent.react()
      required: [id, insight_type, content, severity, created_at]
      properties:
        id:
          type: integer
          description: Auto-increment row ID
        insight_type:
          type: string
          enum: [bot_farm_cluster, high_risk_trajectory, near_eligibility, anomaly_reaction]
          description: Category of this insight
        device_id:
          type: string
          description: Device ID associated with this insight (empty for cluster-level insights)
        content:
          type: string
          description: Human-readable description of the insight
        severity:
          type: string
          enum: [low, medium, critical]
          description: Alert severity level
        created_at:
          type: number
          format: float
          description: Unix timestamp (seconds) when the insight was created

    ProactiveAlertEvent:
      type: object
      description: WebSocket event broadcast by ProactiveMonitor when a proactive alert fires
      required: [type, insight_type, content, severity, timestamp]
      properties:
        type:
          type: string
          enum: [proactive_alert]
          description: Always "proactive_alert" for this event type
        insight_type:
          type: string
          description: Category of this alert (matches ProtocolInsight.insight_type)
        device_id:
          type: string
          description: Device ID (empty for cluster-level alerts)
        content:
          type: string
          description: Human-readable alert message
        severity:
          type: string
          enum: [low, medium, critical]
        timestamp:
          type: number
          format: float
          description: Unix timestamp when the alert was dispatched
        cluster_id:
          type: string
          description: "Present for bot_farm_cluster alerts — the cluster identifier"
        device_count:
          type: integer
          description: "Present for bot_farm_cluster alerts — number of devices in cluster"
        cumulative_score:
          type: integer
          description: "Present for near_eligibility alerts — the device's PHG cumulative score"
        warmup_attack_score:
          type: number
          description: "Present for high_risk_trajectory alerts"
        burst_farming_score:
          type: number
          description: "Present for high_risk_trajectory alerts"

    # ---- Phase 34: Federation ----

    FederationCluster:
      type: object
      description: A cluster record in the federation_registry table (Phase 34)
      required: [id, cluster_hash, device_count, suspicion_bucket, bridge_id, detected_at, is_local]
      properties:
        id:
          type: integer
          description: Auto-increment row ID
        cluster_hash:
          type: string
          description: "16-char SHA-256 hex fingerprint of the device cluster (non-reversible: raw device IDs never shared)"
        peer_url:
          type: string
          description: Source peer URL (empty for locally-detected clusters)
        device_count:
          type: integer
          description: Number of devices in this cluster
        suspicion_bucket:
          type: string
          enum: [medium, critical]
          description: Suspicion severity bucket
        bridge_id:
          type: string
          description: Anonymous 16-char bridge identity derived from SHA-256(api_key)
        detected_at:
          type: number
          format: float
          description: Unix timestamp when this cluster was detected or received
        is_local:
          type: boolean
          description: True if detected by this bridge; False if received from a peer

    # ---- Phase 35: Synthesis ----

    InsightDigest:
      type: object
      description: A synthesized rolling-window digest of protocol_insights (Phase 35)
      required: [id, window_label, synthesized_at, bot_farm_count, high_risk_count, federated_count, anomaly_count, eligible_count, dominant_severity, top_devices, narrative]
      properties:
        id:
          type: integer
          description: Auto-increment row ID
        window_label:
          type: string
          enum: [24h, 7d, 30d]
          description: Time window this digest covers
        synthesized_at:
          type: number
          format: double
          description: Unix epoch seconds when this digest was synthesized
        bot_farm_count:
          type: integer
          description: Number of bot_farm_cluster insights in this window
        high_risk_count:
          type: integer
          description: Number of high_risk_trajectory insights in this window
        federated_count:
          type: integer
          description: Number of federated_cluster insights in this window
        anomaly_count:
          type: integer
          description: Number of anomaly_reaction insights in this window
        eligible_count:
          type: integer
          description: Number of near_eligibility insights in this window
        dominant_severity:
          type: string
          enum: [low, medium, high, critical]
          description: Highest severity level observed in this window
        top_devices:
          type: array
          items:
            type: string
          maxItems: 5
          description: Up to 5 device IDs with the most alerts in this window
        narrative:
          type: string
          description: Template-based natural-language summary of this window's threat activity

    DeviceRiskLabel:
      type: object
      description: Persistent per-device risk trajectory label updated by InsightSynthesizer (Phase 35)
      required: [device_id, risk_label, label_evidence, label_set_at, prior_label]
      properties:
        device_id:
          type: string
          description: Device identifier (keccak256 pubkey hex)
        risk_label:
          type: string
          enum: [stable, warming, critical, cleared]
          description: "Current risk trajectory label. stable=no signals; warming=advisory pattern; critical=confirmed threat; cleared=prior risk, now clean"
        label_evidence:
          type: object
          description: Count of each signal type that contributed to this label in the 7d window
          properties:
            bot:
              type: integer
            high_risk:
              type: integer
            fed:
              type: integer
            anomaly:
              type: integer
        label_set_at:
          type: number
          format: double
          description: Unix epoch seconds when this label was last set
        prior_label:
          type: string
          enum: [stable, warming, critical, cleared, ""]
          description: Previous risk label before the most recent transition

    SynthesisReport:
      type: object
      description: Response envelope for GET /operator/digest (Phase 35)
      required: [synthesis_available, digests, critical_devices, warming_devices]
      properties:
        synthesis_available:
          type: boolean
          description: True if at least one insight digest has been synthesized
        digests:
          type: array
          items:
            $ref: "#/components/schemas/InsightDigest"
          description: List of insight digests (one per window_label when window=all)
        critical_devices:
          type: array
          items:
            $ref: "#/components/schemas/DeviceRiskLabel"
          description: All devices currently labeled 'critical'
        warming_devices:
          type: array
          items:
            $ref: "#/components/schemas/DeviceRiskLabel"
          description: All devices currently labeled 'warming'

    # ---- Phase 36: Adaptive Feedback ----

    DetectionPolicy:
      type: object
      description: Per-device adaptive PITL threshold multiplier set by InsightSynthesizer Mode 4 (Phase 36)
      required: [device_id, multiplier, basis_label, set_at, expires_at]
      properties:
        device_id:
          type: string
          description: Device identifier (keccak256 pubkey hex)
        multiplier:
          type: number
          format: double
          description: "L4 Mahalanobis threshold multiplier. critical=0.70 (30% tighter); warming=0.85; cleared/stable=1.00 (baseline)"
          minimum: 0.5
          maximum: 1.0
        basis_label:
          type: string
          enum: [critical, warming, cleared, stable]
          description: Risk label that caused this policy to be set
        set_at:
          type: number
          format: double
          description: Unix epoch seconds when this policy was last written
        expires_at:
          type: number
          format: double
          description: "Unix epoch seconds when this policy auto-expires (set_at + poll_interval + 3600s)"

    AdaptiveFeedbackReport:
      type: object
      description: Summary of active adaptive detection policies (Phase 36)
      required: [policies, total_count, adaptive_enabled, critical_policy_multiplier, warming_policy_multiplier]
      properties:
        policies:
          type: array
          items:
            $ref: "#/components/schemas/DetectionPolicy"
          description: List of active (non-expired) detection policies
        total_count:
          type: integer
          description: Number of active policies returned
        adaptive_enabled:
          type: boolean
          description: Whether ADAPTIVE_THRESHOLDS_ENABLED is true for this bridge
        critical_policy_multiplier:
          type: number
          format: double
          description: "Fixed multiplier applied to critical devices (0.70)"
          example: 0.70
        warming_policy_multiplier:
          type: number
          format: double
          description: "Fixed multiplier applied to warming devices (0.85)"
          example: 0.85

    # ---- Phase 37: Credential Enforcement ----

    CredentialEnforcementState:
      type: object
      description: Credential enforcement state for a single device (Phase 37)
      required: [device_id, consecutive_critical, suspended, last_updated]
      properties:
        device_id:
          type: string
          description: Device identifier (keccak256 pubkey hex)
        consecutive_critical:
          type: integer
          description: Number of consecutive 7-day windows labeled critical (reset on cleared/stable)
        suspended:
          type: integer
          enum: [0, 1]
          description: "1 = credential currently suspended; 0 = not suspended"
        suspended_since:
          type: number
          format: double
          nullable: true
          description: Unix epoch seconds when suspension began (null if not suspended)
        suspended_until:
          type: number
          format: double
          nullable: true
          description: Unix epoch seconds when suspension expires (null if not suspended)
        evidence_hash:
          type: string
          nullable: true
          description: "SHA-256(device_id:insight_digest_id) — immutable reference to triggering evidence"
        last_updated:
          type: number
          format: double
          description: Unix epoch seconds of last state change

    CredentialEnforcementResponse:
      type: object
      description: Response envelope for GET /operator/enforcement (Phase 37)
      required: [suspended_count, suspended_devices, enforcement_enabled, min_consecutive_windows]
      properties:
        suspended_count:
          type: integer
          description: Number of currently suspended credentials
        suspended_devices:
          type: array
          items:
            $ref: "#/components/schemas/CredentialEnforcementState"
          description: List of currently suspended credential enforcement rows
        enforcement_enabled:
          type: boolean
          description: Whether PHG_CREDENTIAL_ENFORCEMENT_ENABLED is true for this bridge
        min_consecutive_windows:
          type: integer
          description: "Minimum consecutive critical windows before suspension triggers (default: 2)"

    CredentialSuspensionEvent:
      type: object
      description: Protocol insight generated when a PHGCredential is suspended or reinstated (Phase 37)
      required: [insight_type, device_id, content, severity, created_at]
      properties:
        insight_type:
          type: string
          enum: [credential_suspended, credential_reinstated]
          description: Type of enforcement event
        device_id:
          type: string
          description: Device whose credential was affected
        content:
          type: string
          description: Human-readable description including consecutive window count, duration, and evidence hash prefix
        severity:
          type: string
          enum: [critical, low]
          description: "critical for suspension; low for reinstatement"
        created_at:
          type: number
          format: double
          description: Unix epoch seconds of event creation

    # ---- Common ----

    EnrollmentStatus:
      type: object
      required: [device_id, status, sessions_nominal, sessions_total,
                 avg_humanity, required_sessions, required_humanity]
      properties:
        device_id:    { type: string }
        status:
          type: string
          enum: [pending, eligible, minting, credentialed, failed, unavailable]
        sessions_nominal:  { type: integer, minimum: 0 }
        sessions_total:    { type: integer, minimum: 0 }
        avg_humanity:      { type: number, minimum: 0.0, maximum: 1.0 }
        tx_hash:           { type: string }
        eligible_at:       { type: number, nullable: true }
        credentialed_at:   { type: number, nullable: true }
        required_sessions: { type: integer, default: 10 }
        required_humanity: { type: number, default: 0.60 }

    AgentRuling:
      type: object
      required: [device_id, verdict, confidence, reasoning, commitment_hash, timestamp, dry_run]
      properties:
        id:              { type: integer }
        device_id:       { type: string }
        verdict:
          type: string
          enum: [FLAG, HOLD, BLOCK, CERTIFY, CLEAR]
        confidence:      { type: number, minimum: 0.0, maximum: 1.0 }
        reasoning:       { type: string }
        evidence_json:   { type: string, description: "JSON-encoded evidence summary" }
        attestation_hash: { type: string, description: "SDKAttestation.attestation_hash hex" }
        commitment_hash: { type: string, description: "SHA-256 hex commitment over verdict+evidence+attestation+ts_ns" }
        dry_run:         { type: boolean }
        source_agent:    { type: string, default: "session_adjudicator" }
        created_at:      { type: number }
        expires_at:      { type: number, nullable: true }

    AgentRulingList:
      type: object
      required: [device_id, rulings, count]
      properties:
        device_id:  { type: string }
        rulings:
          type: array
          items:
            $ref: "#/components/schemas/AgentRuling"
        count:      { type: integer }

    AdjudicateRequest:
      type: object
      required: [device_id]
      properties:
        device_id:
          type: string
          description: "64-char hex VAPI device identifier"
        attestation_hash:
          type: string
          description: "SDKAttestation.attestation_hash hex (enables BLOCK/CERTIFY)"
          default: ""

    AdjudicateResponse:
      type: object
      required: [status, event_id, device_id]
      properties:
        status:    { type: string, example: "queued" }
        event_id:  { type: integer }
        device_id: { type: string }

    InterpretRequest:
      type: object
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: true
          description: "Any VAPI data dict (e.g. PITL score payload, enrollment status)"
        context:
          type: string
          default: ""
          description: "Optional human context for the LLM interpretation"

    InterpretResponse:
      type: object
      description: "Input data dict merged with agent_interpretation field"
      properties:
        agent_interpretation:
          type: object
          properties:
            summary:            { type: string }
            risk_level:
              type: string
              enum: [low, medium, high]
            recommended_action: { type: string }
            confidence:         { type: number, minimum: 0.0, maximum: 1.0 }
            status:
              type: string
              description: "Set to 'unavailable' when LLM is offline"
      additionalProperties: true

    RulingStreak:
      type: object
      description: "Phase 66 — current verdict streak for a device"
      properties:
        device_id:         { type: string, description: "64-char hex device identifier" }
        current_streak:    { type: integer, description: "Consecutive rulings with streak_verdict" }
        streak_verdict:    { type: string, enum: [FLAG, HOLD, BLOCK, CERTIFY, CLEAR] }
        streak_start:      { type: number, description: "Unix timestamp when streak began" }
        last_verdict:      { type: string, enum: [FLAG, HOLD, BLOCK, CERTIFY, CLEAR] }
        last_ruling_id:    { type: integer }
        escalated_to:      { type: string, nullable: true, description: "Auto-escalation target (HOLD or BLOCK)" }
        updated_at:        { type: number, description: "Unix timestamp of last update" }

    OnChainRuling:
      type: object
      description: "Phase 66 — on-chain ruling commitment record"
      properties:
        id:                { type: integer }
        ruling_id:         { type: integer }
        device_id:         { type: string }
        commitment_hash:   { type: string, description: "SHA-256 hex from Phase 65 formula" }
        tx_hash:           { type: string, description: "IoTeX testnet transaction hash" }
        block_number:      { type: integer, nullable: true }
        chain_id:          { type: integer, example: 4690 }
        created_at:        { type: number, description: "Unix timestamp" }

    OverrideRequest:
      type: object
      required: [device_id]
      properties:
        device_id:
          type: string
          description: "64-char hex device ID to clear"
        reason:
          type: string
          description: "Human-readable reason for override (operator audit log)"
          example: "manual_review_false_positive"

    OverrideResponse:
      type: object
      properties:
        status:
          type: string
          enum: [overridden]
        ruling_id:
          type: integer
          description: "ID of the inserted CLEAR agent_ruling"
        device_id:
          type: string

    SuspensionStatus:
      type: object
      description: "Phase 67 — PHGCredential suspension state for a device"
      properties:
        device_id:
          type: string
          description: "keccak256(devicePubkey)"
        suspended:
          type: boolean
          description: "True if an active suspension exists and has not yet expired"
        suspended_until:
          type: number
          nullable: true
          description: "Unix epoch (float) when the suspension expires; null if not suspended"
        seconds_remaining:
          type: number
          description: "Seconds until auto-reinstatement; 0.0 if not suspended"
        ruling_streak:
          type: object
          nullable: true
          description: "Current ruling streak entry (null if no streak recorded)"
          properties:
            device_id:
              type: string
            verdict:
              type: string
              enum: [FLAG, HOLD, BLOCK, CLEAR]
            streak_count:
              type: integer
            updated_at:
              type: number

    ValidationStats:
      type: object
      description: "Phase 70 — Unified validation observability snapshot. Aggregates
        proof counts, enrollment pipeline state, data curator lineage, and ruling
        enforcement statistics into one operator endpoint."
      properties:
        timestamp:
          type: number
          description: "Unix epoch when snapshot was taken"
        proof_stats:
          type: object
          properties:
            total_proofs:
              type: integer
            proofs_last_24h:
              type: integer
            nominal_proofs:
              type: integer
            anomaly_proofs:
              type: integer
        enrollment:
          type: object
          properties:
            eligible:
              type: integer
              description: "Devices with enrollment_state='credentialed'"
            in_progress:
              type: integer
              description: "Devices with enrollment_state='in_progress'"
            unenrolled:
              type: integer
        curator_stats:
          type: object
          properties:
            lineage_count:
              type: integer
            oracle_publications:
              type: integer
            eligible_devices:
              type: integer
        ruling_stats:
          type: object
          properties:
            total_rulings:
              type: integer
            block_rulings:
              type: integer
            active_suspensions:
              type: integer

    AgentConfig:
      type: object
      description: "Phase 68 — SessionAdjudicator runtime configuration"
      required: [dry_run]
      properties:
        dry_run:
          type: boolean
          description: |
            When true (default), SessionAdjudicator rulings are advisory only and do not
            trigger RulingEnforcementAgent escalation. Set to false to enable live enforcement.
            Requires ≥100 validated sessions before setting false in production.
        status:
          type: string
          description: "Confirmation string (e.g. 'updated') — present in responses only"

    SuspensionProposal:
      type: object
      description: "Phase 72 — PHGCredential bridge-layer multi-sig suspension proposal.
        PHGCredential.bridge is immutable post-deploy; this is a software safeguard.
        Proposal expires after 24h. Execute only when confirmations >= threshold."
      properties:
        proposal_id:
          type: integer
          description: Auto-increment ID for the proposal
        device_id:
          type: string
          description: Target device ID
        evidence_hash:
          type: string
          description: SHA-256 commitment hash of the ruling evidence
        duration_s:
          type: integer
          description: Suspension duration in seconds
        proposed_by:
          type: string
          description: Truncated SHA-256 of the proposing API key (non-reversible)
        proposed_at:
          type: number
          description: Unix timestamp of proposal
        confirmations:
          type: integer
          description: Number of operator confirmations received
        threshold:
          type: integer
          description: SUSPENSION_MULTISIG_THRESHOLD value at response time
        executed:
          type: boolean
          description: True if on-chain suspension has been executed
        tx_hash:
          type: string
          description: IoTeX transaction hash (set after execution)
        expires_at:
          type: number
          description: Proposal expiry unix timestamp (proposed_at + 86400)
        status:
          type: string
          enum: [proposed, confirmed, executed, expired]

    RulingProvenance:
      type: object
      description: "Phase 76 — Cryptographic provenance anchor for an agent ruling.
        Binds the ruling commitment (on-chain), ceremony integrity data (CeremonyRegistry),
        and evidence set (presented to LLM) into a single verifiable SHA-256 fingerprint.
        Any third party can recompute provenance_hash from the stored components."
      properties:
        id:
          type: integer
          description: Auto-increment anchor record ID
        ruling_id:
          type: integer
          description: The agent_rulings.id this anchor corresponds to
        device_id:
          type: string
          description: Device ID of the ruling subject
        provenance_hash:
          type: string
          description: >-
            SHA-256(commitment_hash|ceremony_canonical|evidence_canonical).
            The canonical composite audit fingerprint. 64 hex characters.
        ceremony_hash:
          type: string
          description: >-
            SHA-256 of canonical ceremony data
            {"beacon_block_number":N,"contributor_count":N} with sort_keys=True.
        evidence_hash:
          type: string
          description: SHA-256 of evidence_json with sort_keys=True. 64 hex characters.
        anchored_at:
          type: number
          description: Unix timestamp when the anchor was computed.

    ValidationGate:
      type: object
      description: "Phase 75+78 — SessionAdjudicatorValidationAgent gate status.
        Tracks consecutive LLM rulings that agree with the deterministic rule
        fallback oracle. Phase 78 adds max_divergence_rate rate-tolerance criterion.
        gate_passed = (consecutive_clean >= gate_n) AND (divergence_rate <= max_divergence_rate).
        Both criteria evaluated over the trailing gate_n window only — pre-gate
        early divergences do not permanently block enforcement activation."
      properties:
        total:
          type: integer
          description: Total number of rulings validated since bridge start
        divergence_count:
          type: integer
          description: Total ruling divergences (LLM vs fallback) detected
        consecutive_clean:
          type: integer
          description: Clean rulings in the most recent unbroken streak
        gate_n:
          type: integer
          description: Required consecutive_clean to pass the gate (VALIDATION_GATE_N)
        gate_passed:
          type: boolean
          description: >-
            True when consecutive_clean >= gate_n AND divergence_rate <= max_divergence_rate.
            Phase 78: both criteria must be satisfied simultaneously.
        divergence_rate:
          type: number
          format: float
          description: >-
            Fraction of rulings in the trailing gate_n window that were divergent.
            divergences_in_window / window_size. Phase 78.
        divergence_rate_ok:
          type: boolean
          description: >-
            True when divergence_rate <= max_divergence_rate. Phase 78.
        max_divergence_rate:
          type: number
          format: float
          description: >-
            Operator-configured maximum tolerable divergence rate
            (VALIDATION_MAX_DIVERGENCE_RATE env var, default 1.0 = no rate limit).
            Phase 78.
        window_size:
          type: integer
          description: >-
            Actual number of records in the trailing gate_n window used to
            compute divergence_rate. May be less than gate_n early in operation.
            Phase 78.
        recommended_action:
          type: string
          description: >-
            Human-readable recommendation: "Safe to enable live enforcement via
            POST /agent/config AGENT_DRY_RUN=false", or guidance on how many
            more clean rulings are needed, or rate exceeded message. Phase 78.

    LiveModeStatus:
      type: object
      description: >-
        Multi-condition readiness status for dry-run → live enforcement
        transition, evaluated by LiveModeActivationAgent. Phase 79.
      required: [ready_for_live_mode, current_dry_run, conditions,
                 blocking_conditions, gate_summary, recommended_action]
      properties:
        ready_for_live_mode:
          type: boolean
          description: True only when all 5 conditions pass simultaneously.
        current_dry_run:
          type: boolean
          description: Current value of agent_dry_run_mode config flag.
        conditions:
          type: object
          description: Boolean status of each readiness condition.
          properties:
            validation_gate_passed:
              type: boolean
            no_recent_operator_overrides:
              type: boolean
            no_recent_key_rotation:
              type: boolean
            divergence_rate_within_tolerance:
              type: boolean
            consecutive_clean_met:
              type: boolean
        blocking_conditions:
          type: array
          items:
            type: string
          description: Names of conditions currently blocking live mode.
        gate_summary:
          type: object
          description: >-
            Summary of validation gate metrics: consecutive_clean,
            divergence_rate, gate_passed.
          additionalProperties: true
        recommended_action:
          type: string
          description: Human-readable advisory on what to do next.

    ThreatSignalPayload:
      type: object
      description: >-
        Federation threat signal broadcast payload from a peer bridge. Phase 80.
      required: [device_id, commitment_hash]
      properties:
        device_id:
          type: string
          description: Device identifier (opaque string, not stored in full on-chain).
        commitment_hash:
          type: string
          description: SHA-256 BLOCK ruling commitment hash (64 hex chars).
        circuit_id:
          type: string
          description: ZK circuit identifier (SHA3-256 of circuit name, 64 hex chars).
        source_peer:
          type: string
          description: URL of originating bridge peer.

    FederationStatus:
      type: object
      description: >-
        Federation broadcast agent status and signal statistics. Phase 80.
      required: [peers, stats]
      properties:
        peers:
          type: array
          items:
            type: string
          description: Configured peer bridge URLs.
        stats:
          type: object
          description: Signal count statistics.
          properties:
            total_signals:
              type: integer
            pending_broadcast:
              type: integer
              description: Locally-originated signals not yet broadcast to peers.
            received_from_peers:
              type: integer
              description: Signals received from peer bridges.
            broadcast:
              type: integer
              description: Signals successfully broadcast to at least one peer.

    ClassJAssessment:
      type: object
      description: >-
        Per-device GaussianHMM ML-bot risk assessment from ClassJDetector.
        Discriminating signal: temporal_state_transition_entropy_variance.
        LOW = human-consistent (>0.15), MEDIUM = ambiguous (0.05-0.15),
        HIGH = Class J signature (<=0.05). Phase 81.
      required: [device_id, entropy_variance, risk_level, window_count]
      properties:
        device_id:
          type: string
        entropy_variance:
          type: number
          format: float
          description: >-
            Sample variance of Shannon entropy across N windows.
            Human: >0.15 (rhythmic game events). Class J HMM: <0.02 (uniform).
        risk_level:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        window_count:
          type: integer
          description: Number of session entropy windows used in assessment.
        assessed_at:
          type: number
          format: float
          description: Unix timestamp of most recent assessment.
        note:
          type: string
          nullable: true
          description: Present when insufficient windows are available.

    AgentSupervisorStatus:
      type: object
      description: >-
        VAPI agent fleet health snapshot from AgentSupervisor (Phase 83).
        Reports HEALTHY/STALE/UNKNOWN/ZOMBIE per agent + fleet-level health.
      required: [agents, fleet_health, healthy_count, stale_count, unknown_count]
      properties:
        agents:
          type: object
          description: Per-agent health results keyed by agent_name.
          additionalProperties:
            $ref: "#/components/schemas/AgentHealthResult"
        fleet_health:
          type: string
          enum: [ALL_HEALTHY, DEGRADED, CRITICAL, UNKNOWN]
          description: >-
            ALL_HEALTHY: all 9 agents HEALTHY.
            DEGRADED: 1–2 agents non-HEALTHY.
            CRITICAL: ≥3 non-HEALTHY, or core agent (session_adjudicator,
            ruling_enforcement_agent) is STALE.
        healthy_count:
          type: integer
        stale_count:
          type: integer
        unknown_count:
          type: integer
        zombie_count:
          type: integer
          description: Agents writing rows but to 0 distinct devices (W1 loop detection).
        stale_threshold_minutes:
          type: number
          format: float
        timestamp:
          type: number
          format: float

    AgentHealthResult:
      type: object
      description: Per-agent health check result (Phase 83).
      properties:
        health:
          type: string
          enum: [HEALTHY, STALE, UNKNOWN, ZOMBIE]
        last_active_at:
          type: number
          format: float
          nullable: true
          description: Unix timestamp of most recent row in agent's activity table.
        activity_count:
          type: integer
          description: Total rows in agent's activity table.
        distinct_devices:
          type: integer
          nullable: true
          description: Distinct device_ids processed. Null for agents with no device scope.

    WarmUpReport:
      type: object
      description: >-
        Result of a POST /agent/warm-up batch (Phase 84).
        llm_available=false means Anthropic key is missing — adjudications ran via
        _rule_fallback only. Operator must confirm llm_available=true before going live.
      properties:
        completed:
          type: integer
          description: Devices successfully adjudicated.
        failed:
          type: integer
          description: Devices that failed or timed out.
        llm_available:
          type: boolean
          description: >-
            True if Anthropic client was importable (W1 — llm used in warm-up).
            False means warm-up ran on rule fallback logic only.
        fallback_count:
          type: integer
          description: Number of adjudications that used rule fallback (llm_available=false).
        duration_ms:
          type: number
          format: float
          description: Total batch duration in milliseconds.
        device_ids_attempted:
          type: array
          items:
            type: string
        batch_size:
          type: integer

    GateReadiness:
      type: object
      description: >-
        Composite live-mode gate readiness snapshot (Phase 84).
        overall_ready=true requires gate_passed AND fleet_health != CRITICAL.
      properties:
        overall_ready:
          type: boolean
          description: >-
            True when validation gate is passed AND fleet health is not CRITICAL or UNKNOWN.
            Set AGENT_DRY_RUN=false only when this is true.
        dry_run_active:
          type: boolean
          description: Current value of AGENT_DRY_RUN config.
        gate_attestations_count:
          type: integer
          description: Number of gate attestation hashes stored (on-chain proofs count).
        validation_gate:
          type: object
          description: Validation gate status (from get_validation_gate_status).
          additionalProperties: true
        fleet_health:
          type: object
          description: Fleet health snapshot (from AgentSupervisor.check_fleet_health).
          additionalProperties: true
        timestamp:
          type: number
          format: float

    GateReadinessResult:
      type: object
      description: >-
        SDK VAPITournamentGate.check_gate_readiness() response (Phase 85).
        Never raises — error field is non-null on failure.
      properties:
        overall_ready:
          type: boolean
        dry_run_active:
          type: boolean
        gate_attestations_count:
          type: integer
        validation_gate:
          type: object
          additionalProperties: true
        fleet_health:
          type: object
          additionalProperties: true
        timestamp:
          type: number
          format: float
        error:
          type: string
          nullable: true

    CeremonyAuditResult:
      type: object
      description: >-
        SDK VAPICeremonyAudit.audit() response (Phase 85).
        on_chain_match=false means the local vkey hash diverged from CeremonyRegistry.
      properties:
        local_hash:
          type: string
          description: SHA3-256 of the local vkey JSON (hex).
        on_chain_match:
          type: boolean
        contributor_count:
          type: integer
        beacon_block_number:
          type: integer
        circuit_name:
          type: string
        registry_address:
          type: string
        error:
          type: string
          nullable: true

    RulingStreamEvent:
      type: object
      description: >-
        Single SSE event from VAPIRulingStream.listen() async generator (Phase 85).
      properties:
        event_id:
          type: string
        event_type:
          type: string
          description: SSE event field value (e.g. "ruling", "health", "message").
        data:
          type: object
          additionalProperties: true

    CorpusReport:
      type: object
      description: >-
        Synthetic validation corpus run result (Phase 86).
        ISOLATION: synthetic sessions do NOT count toward consecutive_clean or gate_passed.
      properties:
        generated:
          type: integer
          description: Number of synthetic sessions generated.
        passed_fallback:
          type: integer
          description: Sessions where rule_fallback returned CERTIFY.
        failed_fallback:
          type: integer
          description: Sessions where rule_fallback did NOT return CERTIFY (regression indicator).
        all_nominal:
          type: boolean
          description: True when all sessions passed fallback.
        duration_ms:
          type: number
          format: float
        corpus_run_id:
          type: string
        corpus_size:
          type: integer
        error:
          type: string
          nullable: true

    CorpusStatus:
      type: object
      description: >-
        Synthetic validation corpus aggregate statistics (Phase 86).
      properties:
        total:
          type: integer
        passed:
          type: integer
        failed:
          type: integer
        run_count:
          type: integer
        last_run_at:
          type: number
          format: float
          nullable: true
        isolation_note:
          type: string
          description: >-
            Confirms synthetic sessions do NOT affect production consecutive_clean gate.

    CampaignStatus:
      type: object
      description: >-
        Adjudication campaign tracker snapshot toward the N=100 validation gate (Phase 88).
        All fields are derived atomically from ruling_validation_log via get_validation_summary().
      required:
        - consecutive_clean
        - gate_n
        - progress_pct
        - session_count
        - divergence_count
        - divergence_rate
        - gate_passed
        - estimated_sessions_to_gate
        - verdict_breakdown
        - divergence_breakdown
        - recent_sessions
        - campaign_note
      properties:
        consecutive_clean:
          type: integer
          description: Current unbroken run of non-diverged sessions.
        gate_n:
          type: integer
          description: Target gate threshold (default 100).
        progress_pct:
          type: number
          format: float
          description: consecutive_clean / gate_n × 100.
        session_count:
          type: integer
          description: Total sessions in ruling_validation_log.
        divergence_count:
          type: integer
          description: Total diverged sessions.
        divergence_rate:
          type: number
          format: float
          description: divergence_count / session_count (0.0 when session_count=0).
        gate_passed:
          type: boolean
          description: True when consecutive_clean >= gate_n AND divergence_rate within tolerance.
        estimated_sessions_to_gate:
          type: integer
          nullable: true
          description: >-
            Projected sessions remaining to reach gate_n clean streak.
            ceil(remaining / (1 - divergence_rate)). Null when divergence_rate == 1.0.
        verdict_breakdown:
          type: object
          description: Count of each verdict value in ruling_validation_log.
          additionalProperties:
            type: integer
        divergence_breakdown:
          type: object
          description: >-
            Aggregated non-nominal evidence fields from diverged sessions (Phase 88
            _extract_divergence_fields instrumentation). Empty when all divergences
            have fully nominal evidence.
          additionalProperties: {}
        recent_sessions:
          type: array
          description: Up to 10 most recent ruling_validation_log rows.
          items:
            type: object
        last_session_at:
          type: number
          format: float
          nullable: true
          description: created_at timestamp of the most recent session.
        campaign_note:
          type: string
          description: >-
            Human-readable progress description. States gate progress or
            "No real sessions yet — run the bridge with a real device to accumulate
            consecutive_clean toward N=100".

    ProtocolIntelligenceReport:
      type: object
      description: >-
        Composite protocol health assessment synthesizing all agent data streams
        into a single score (Phase 89). Synergistically integrates Phase 90 shadow
        enforcement pass rate and Phase 91 triage confidence as bonus components.
      required:
        - protocol_health_score
        - ready_for_live_mode
        - gate_progress_score
        - fleet_health_score
        - divergence_clarity_score
        - corpus_pass_score
        - class_j_confidence_score
        - bottleneck
        - recommendation
        - components
      properties:
        protocol_health_score:
          type: number
          format: float
          description: >-
            Composite score 0–100. Formula:
            100 * (0.35*gate_progress + 0.25*fleet_health + 0.20*divergence_clarity
            + 0.10*corpus_pass + 0.10*class_j_confidence)
            + up to 5 bonus from shadow_pass_score (Phase 90)
            + up to 5 bonus from triage_confidence_score (Phase 91), capped at 100.
        ready_for_live_mode:
          type: boolean
          description: >-
            True when protocol_health_score >= 85.0 AND gate_passed AND
            fleet_health not in (CRITICAL, UNKNOWN).
        gate_progress_score:
          type: number
          format: float
          description: Component 0–1. consecutive_clean / gate_n.
        fleet_health_score:
          type: number
          format: float
          description: Component 0–1. 1.0=ALL_HEALTHY, 0.5=DEGRADED, 0.0=CRITICAL.
        divergence_clarity_score:
          type: number
          format: float
          description: Component 0–1. 1 - (unexplained_divergences / total_diverged). 0.5 when no data.
        corpus_pass_score:
          type: number
          format: float
          description: Component 0–1. Synthetic corpus pass rate. 0.5 neutral when no corpus run.
        class_j_confidence_score:
          type: number
          format: float
          description: Component 0–1. Fraction of Class J assessments at LOW risk. 0.5 when no data.
        shadow_pass_score:
          type: number
          format: float
          nullable: true
          description: Phase 90 bonus component 0–1. Null when no shadow log entries.
        triage_confidence_score:
          type: number
          format: float
          nullable: true
          description: Phase 91 bonus component 0–1. Null when no triage reports.
        bottleneck:
          type: string
          nullable: true
          description: Name of the lowest-scoring component, or null when score >= 85.
        estimated_days_to_gate:
          type: number
          format: float
          nullable: true
          description: Projection based on recent session velocity. Null when not computable.
        components:
          type: object
          description: Full breakdown of all scored components.
          additionalProperties: {}
        recommendation:
          type: string
          description: Human-readable next action.

    ShadowEnforcementLog:
      type: object
      description: >-
        Shadow enforcement log entries and aggregate stats (Phase 90).
        Entries represent BLOCK actions that were logged instead of executed
        when ENFORCEMENT_SHADOW_MODE=true. Used by operators to validate the
        false-positive rate before enabling real enforcement.
      required:
        - shadow_mode_active
        - entries
        - total_returned
        - stats
      properties:
        shadow_mode_active:
          type: boolean
          description: True when ENFORCEMENT_SHADOW_MODE=true in current config.
        entries:
          type: array
          description: Shadow enforcement log rows (most recent first).
          items:
            type: object
            properties:
              id:
                type: integer
              device_id:
                type: string
              ruling_id:
                type: integer
                nullable: true
              verdict:
                type: string
              commitment_hash:
                type: string
                nullable: true
              would_have_suspended:
                type: integer
              duration_s:
                type: integer
                nullable: true
              warmup_attack_score:
                type: number
                format: float
                nullable: true
              created_at:
                type: number
                format: float
        total_returned:
          type: integer
        stats:
          type: object
          description: Aggregate stats — total_shadow_blocks, unique_devices, avg_duration_s, shadow_pass_rate.
          additionalProperties: {}

    TriageReport:
      type: object
      description: >-
        Per-device divergence triage results from DivergenceTriageAgent (Phase 91).
        Detects cross-session adversarial patterns from divergence_reason JSON in
        ruling_validation_log. Escalated devices are candidates for immediate ruling.
      required:
        - entries
        - total_returned
        - escalated_count
        - clean_count
      properties:
        entries:
          type: array
          description: Triage report rows per device.
          items:
            type: object
            properties:
              device_id:
                type: string
              divergence_count:
                type: integer
              escalated:
                type: integer
                description: 1 if any adversarial pattern threshold was crossed.
              patterns:
                type: string
                nullable: true
                description: Comma-separated detected pattern names (ml_bot_cluster, cheat_cluster, enrollment_anomaly).
              ml_bot_high_count:
                type: integer
              cheat_count:
                type: integer
              enrollment_anomaly_count:
                type: integer
              assessed_at:
                type: number
                format: float
        total_returned:
          type: integer
        escalated_count:
          type: integer
          description: Count of entries with escalated=1.
        clean_count:
          type: integer
          description: Count of entries with escalated=0.

    ActivationReadiness:
      type: object
      description: >-
        Phase 92 — Activation readiness check result returned by POST /agent/request-activation.
        Reflects current Phase 89 protocol_health_score and blocking conditions.
        NEVER auto-activates — operator must set AGENT_DRY_RUN=false explicitly.
      required:
        - ready_for_live_mode
        - protocol_health_score
        - blocking_conditions
        - recommended_action
      properties:
        ready_for_live_mode:
          type: boolean
          description: True when score>=85, gate_passed, and fleet!=CRITICAL.
        protocol_health_score:
          type: number
          format: float
          description: Current Phase 89 composite score (0–100).
        bottleneck:
          type: string
          nullable: true
          description: Name of lowest-scoring component, or null when ready.
        blocking_conditions:
          type: array
          items:
            type: string
          description: List of conditions preventing live mode activation.
        recommended_action:
          type: string
          description: Human-readable next step.
        timestamp:
          type: number
          format: float

    ActivationLog:
      type: object
      description: >-
        Phase 92 — Live mode activation audit trail. Contains all readiness_check
        and operator_request events with protocol health context and operator notes.
      required:
        - entries
        - total_returned
        - latest_ready_for_live_mode
      properties:
        entries:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              event_type:
                type: string
                description: "'readiness_check' | 'operator_request'"
              ready_for_live_mode:
                type: integer
                description: 1=ready, 0=not ready.
              protocol_health_score:
                type: number
                format: float
                nullable: true
              bottleneck:
                type: string
                nullable: true
              blocking_conditions:
                type: string
                nullable: true
                description: JSON-encoded list.
              operator_notes:
                type: string
                nullable: true
              created_at:
                type: number
                format: float
        total_returned:
          type: integer
        latest_ready_for_live_mode:
          type: boolean

    EscalationRulingLog:
      type: object
      description: >-
        Phase 94 — Triage reactive ruling log. Entries written when DivergenceTriageAgent
        escalates a device via divergence_pattern_detected bus and SessionAdjudicator fires
        an immediate out-of-cycle ruling. was_deferred=1 entries are rate-limited (1/hour default).
      required:
        - entries
        - total_returned
      properties:
        entries:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              device_id:
                type: string
              patterns:
                type: string
                nullable: true
                description: Comma-separated detected pattern names.
              verdict:
                type: string
                nullable: true
                description: CERTIFY/FLAG/HOLD/BLOCK or null if deferred.
              ruling_id:
                type: integer
                nullable: true
              was_deferred:
                type: integer
                description: 1 if rate-limited, 0 if ruling was fired.
              created_at:
                type: number
                format: float
        total_returned:
          type: integer

    EnforcementCertificate:
      type: object
      description: >-
        Phase 96 — Portable HMAC-SHA256-signed proof of AI enforcement readiness.
        audit_hash = SHA-256(canonical JSON of audit fields). hmac_sig = HMAC-SHA256(audit_hash, operator_api_key).
        Tournament operators can verify readiness without VAPI infrastructure.
      properties:
        cert_id:
          type: integer
          nullable: true
        audit_hash:
          type: string
          description: SHA-256 of canonical audit state JSON.
        hmac_sig:
          type: string
          description: HMAC-SHA256 of audit_hash signed with operator_api_key.
        audit_valid:
          type: boolean
        expires_at:
          type: number
          format: float
        issued_at:
          type: number
          format: float

    EnforcementCertificateStatus:
      type: object
      description: Phase 96 — Latest ERC status (wrapper around certificate).
      properties:
        certificate:
          nullable: true
          description: Full certificate dict or null if none issued.
        has_certificate:
          type: boolean
        is_expired:
          type: boolean
        timestamp:
          type: number
          format: float

    LiveModeGuardLog:
      type: object
      description: >-
        Phase 97 — Audit log of every live-mode transition attempt via POST /agent/config.
        Includes approved transitions and blocked attempts with blocking_conditions list.
      properties:
        entries:
          type: array
          items:
            type: object
            properties:
              event_type:
                type: string
                description: transition_attempt | transition_approved | dry_run_restored
              gate_passed:
                type: integer
                nullable: true
              cert_valid:
                type: integer
                nullable: true
              audit_valid:
                type: integer
                nullable: true
              blocking_conditions:
                type: string
                description: JSON array of blocking condition names.
              operator_key_hash:
                type: string
              created_at:
                type: number
                format: float
        count:
          type: integer
        current_dry_run:
          type: boolean
        timestamp:
          type: number
          format: float

    OperatorStatus:
      type: object
      description: >-
        Phase 99A — AGaaS Foundation operator staking status.
        Reflects bridge-side record of VAPIOperatorRegistry.sol events.
        MINIMUM_STAKE=10,000 VAPI; slash burns 50%, sends 50% to claimant;
        deregister requires 30-day cooldown after requestDeregister().
      properties:
        operator_address:
          type: string
          description: Ethereum address queried
        found:
          type: boolean
          description: True if operator has at least one recorded event
        status:
          type: object
          nullable: true
          description: Latest registration event row (null if not found)
          properties:
            operator_address:
              type: string
            event_type:
              type: string
              enum: [register, slash, deregister_request, deregister]
            stake_amount:
              type: string
              description: VAPI token amount in wei (string to avoid precision loss)
            tx_hash:
              type: string
            reason:
              type: string
            created_at:
              type: number
              format: float
        vapi_token_address:
          type: string
          description: VAPIToken.sol address from bridge config
        operator_registry_address:
          type: string
          description: VAPIOperatorRegistry.sol address from bridge config
        timestamp:
          type: number
          format: float

    VHPMintResult:
      type: object
      description: >-
        Phase 99C — Result of a successful POST /agent/mint-vhp call.
        tx_hash is the on-chain mint transaction. expires_at is 90 days from issuance.
      properties:
        tx_hash:
          type: string
          description: On-chain transaction hash for the VHP mint
        expires_at:
          type: number
          format: float
          description: Unix timestamp when the VHP token expires (now + 90 days)
        device_id:
          type: string
        to_address:
          type: string
        consecutive_clean:
          type: integer
        confidence_score:
          type: integer
          description: Basis points (0–10000)
        timestamp:
          type: number
          format: float

    VHPStatus:
      type: object
      description: >-
        Phase 99C — VHP token status from bridge SQLite store.
        is_valid=True when expires_at > now and found=True.
        found=False if no VHP has been minted for this device.
      properties:
        device_id:
          type: string
        found:
          type: boolean
        is_valid:
          type: boolean
          description: True if token exists and has not expired
        token_id:
          type: integer
        cert_level:
          type: integer
          enum: [1, 2]
          description: "1=controller, 2=controller+GSR"
        consecutive_clean:
          type: integer
        expires_at:
          type: number
          format: float
        tx_hash:
          type: string
        to_address:
          type: string
        vhp_contract_address:
          type: string
          description: VAPIVerifiedHumanProof.sol address from bridge config
        timestamp:
          type: number
          format: float

    GSRSample:
      type: object
      description: >-
        Phase 99B — L7 Galvanic Skin Response biometric sample.
        GSR_ENABLED=false default (advisory layer, code-before-hardware precedent).
        arousal_index: 0.0–1.0 normalized SCR amplitude.
        correlation: Pearson r with game events (-1.0 to 1.0).
        conductance_raw: raw skin conductance in μS.
        l7_features: {sympathetic_arousal_index, gsr_game_event_correlation,
          baseline_conductance_drift, cognitive_load_variance}.
        Inference code 0x33 GSR_CORRELATION_ABSENT is ADVISORY ONLY — never hard gates.
      properties:
        device_id:
          type: string
          description: Device identifier (keccak256-derived in on-chain path)
        arousal_index:
          type: number
          format: float
          description: Sympathetic arousal index 0.0–1.0 (SCR normalized amplitude)
        correlation:
          type: number
          format: float
          description: Pearson r correlation with game events (-1.0 to 1.0)
        conductance_raw:
          type: number
          format: float
          description: Raw skin conductance in μS (microsiemens)
        l7_features_json:
          type: string
          description: >-
            JSON-encoded L7 feature dict: {sympathetic_arousal_index (float),
            gsr_game_event_correlation (float), baseline_conductance_drift (float),
            cognitive_load_variance (float)}
        created_at:
          type: number
          format: float
          description: Unix timestamp of sample insertion

    EpistemicConsensusLog:
      type: object
      description: >-
        Phase 98 — Multi-agent consensus log. Before irreversible BLOCK enforcement,
        three agents vote: ClassJDetector (0.40), DivergenceTriageAgent (0.40), AgentSupervisor (0.20).
        consensus_score < 0.60 downgrades BLOCK to HOLD. downgraded=1 tracks false-positive protection.
      properties:
        entries:
          type: array
          items:
            type: object
            properties:
              device_id:
                type: string
              proposed_verdict:
                type: string
              class_j_score:
                type: number
                format: float
              triage_score:
                type: number
                format: float
              supervisor_score:
                type: number
                format: float
              consensus_score:
                type: number
                format: float
              threshold:
                type: number
                format: float
              consensus_reached:
                type: integer
              final_verdict:
                type: string
              downgraded:
                type: integer
              created_at:
                type: number
                format: float
        count:
          type: integer
        downgraded_count:
          type: integer
        timestamp:
          type: number
          format: float

    ActivationAuditReport:
      type: object
      description: >-
        Phase 95 — Tamper-evident activation audit summary. Verifies the full
        cryptographic activation sequence: protocol scored ready_for_live_mode=True
        in live_mode_activation_log, followed by on-chain gate attestation.
        audit_valid=True is the pre-condition for AGENT_DRY_RUN=false.
      required:
        - audit_valid
        - gate_attestation_count
        - audit_summary
        - timestamp
      properties:
        audit_valid:
          type: boolean
          description: True if chronological sequence is intact and both conditions met.
        first_ready_check_at:
          type: number
          format: float
          nullable: true
          description: Unix timestamp of first ready_for_live_mode=True activation log entry.
        gate_attestation_count:
          type: integer
          description: Number of on-chain gate attestations in gate_attestations table.
        latest_attestation_at:
          type: number
          format: float
          nullable: true
          description: Unix timestamp of most recent gate attestation.
        audit_summary:
          type: string
          description: Human-readable description of the audit outcome.
        timestamp:
          type: number
          format: float
          description: Time of this audit query.

    ReactiveAdjudicationLog:
      type: object
      description: >-
        Log of Class J HIGH-risk triggered out-of-cycle LLM rulings (Phase 82).
        was_deferred=true entries were suppressed by the token bucket rate limiter.
      required: [entries, total_returned, deferred_count]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ReactiveAdjudicationEntry"
        total_returned:
          type: integer
        deferred_count:
          type: integer
          description: Number of entries where was_deferred=true (rate-limited).
        timestamp:
          type: number
          format: float

    ReactiveAdjudicationEntry:
      type: object
      description: Single reactive adjudication interrupt log entry (Phase 82).
      properties:
        id:
          type: integer
        device_id:
          type: string
        triggered_by:
          type: string
          description: Bus event type that triggered this entry (class_j_high_risk_detected).
        entropy_variance:
          type: number
          format: float
          nullable: true
        verdict:
          type: string
          nullable: true
          enum: [FLAG, HOLD, BLOCK, CERTIFY, CLEAR]
          description: LLM ruling verdict. Null if was_deferred=true.
        was_deferred:
          type: integer
          enum: [0, 1]
          description: >-
            1 if this interrupt was suppressed by the token bucket rate limiter
            (W1 mitigation). No ruling was issued for deferred entries.
        created_at:
          type: number
          format: float

    ActivationStatus:
      type: object
      description: >-
        Phase 100 — 5-step live-mode activation checklist.
        current_blocking_step: 1=need clean sessions, 2=need enforcement cert,
        3=need audit_valid, 4=need dry_run=false, 5=VHP blocking, 6=fully activated.
      required: [steps, current_blocking_step, fully_activated, recommended_action, warnings, timestamp]
      properties:
        steps:
          type: object
          properties:
            step1_validation_gate:
              type: object
              properties:
                passed:
                  type: boolean
                consecutive_clean:
                  type: integer
                gate_n:
                  type: integer
                progress_pct:
                  type: number
                  format: float
                sessions_remaining:
                  type: integer
                divergence_rate:
                  type: number
                  format: float
            step2_enforcement_cert:
              type: object
              properties:
                issued:
                  type: boolean
                valid:
                  type: boolean
                expires_at:
                  type: number
                  format: float
                  nullable: true
            step3_audit_valid:
              type: object
              properties:
                audit_valid:
                  type: boolean
                gate_attestation_count:
                  type: integer
                first_ready_check_at:
                  type: number
                  format: float
                  nullable: true
            step4_live_mode:
              type: object
              properties:
                dry_run_active:
                  type: boolean
                live_mode_enabled:
                  type: boolean
            step5_vhp_mint:
              type: object
              properties:
                ready:
                  type: boolean
                blocking_conditions:
                  type: array
                  items:
                    type: string
        current_blocking_step:
          type: integer
          description: Which step is currently blocking activation (1-5); 6 = fully activated.
        fully_activated:
          type: boolean
        recommended_action:
          type: string
          description: Exact API call to make next.
        warnings:
          type: array
          items:
            type: string
        timestamp:
          type: number
          format: float

    QuickSilverStatus:
      type: object
      properties:
        operator_address:
          type: string
        found:
          type: boolean
        latest_event_type:
          type: string
          description: lock / unlock_request / claim_unlock / slash / claim_yield
        amount_wei:
          type: string
        events_count:
          type: integer
        last_event_at:
          type: number
        timestamp:
          type: number
    EdgeAIProfile:
      type: object
      properties:
        protocol:
          type: string
        category:
          type: string
        depin_category:
          type: string
        agent_fleet_size:
          type: integer
        agent_fleet:
          type: array
          items:
            type: string
        inference_mode:
          type: string
