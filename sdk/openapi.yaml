          type: array
          description: "Sorted name+id_hex+phase_code triples baked into the FRR pre-image"
          items:
            type: object
            properties:
              name: { type: string }
              agent_id_hex: { type: string }
              phase_code: { type: integer }
        domain_tag:
          type: string
          description: "Domain tag echo (always 'VAPI-FRR-v1')"
        timestamp:
          type: number

